<svg viewBox="0 0 800 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#B6FF3C"/></marker>
    <marker id="b" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#34E0E0"/></marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0E131C"/><stop offset="100%" stop-color="#161D2A"/></linearGradient>
  </defs>
  <rect width="800" height="130" fill="url(#bg)"/>
  <g stroke="#1F2937" stroke-width="0.4" opacity="0.5">
    <line x1="0" y1="43" x2="800" y2="43"/><line x1="0" y1="86" x2="800" y2="86"/>
    <line x1="160" y1="0" x2="160" y2="130"/><line x1="320" y1="0" x2="320" y2="130"/>
    <line x1="480" y1="0" x2="480" y2="130"/><line x1="640" y1="0" x2="640" y2="130"/>
  </g>
  <!-- IoT sensor block with mini bars -->
  <rect x="14" y="30" width="100" height="70" rx="3" fill="#161D2A" stroke="#B6FF3C" stroke-width="1"/>
  <text x="64" y="48" fill="#B6FF3C" font-family="monospace" font-size="9" text-anchor="middle">IoT SENSOR</text>
  <!-- temp chart bars -->
  <rect x="22" y="78" width="7" height="14" rx="1" fill="#B6FF3C" opacity="0.4"/>
  <rect x="33" y="70" width="7" height="22" rx="1" fill="#B6FF3C" opacity="0.6"/>
  <rect x="44" y="64" width="7" height="28" rx="1" fill="#B6FF3C" opacity="0.8"/>
  <rect x="55" y="58" width="7" height="34" rx="1" fill="#B6FF3C"/>
  <rect x="66" y="66" width="7" height="26" rx="1" fill="#B6FF3C" opacity="0.7"/>
  <rect x="77" y="72" width="7" height="20" rx="1" fill="#B6FF3C" opacity="0.5"/>
  <rect x="88" y="60" width="7" height="32" rx="1" fill="#B6FF3C" opacity="0.9"/>
  <text x="64" y="108" fill="#8492A6" font-family="monospace" font-size="7.5" text-anchor="middle">Temp data</text>
  <!-- arrow -->
  <line x1="114" y1="65" x2="148" y2="65" stroke="#B6FF3C" stroke-width="1.2" marker-end="url(#a)"/>
  <!-- Algorithm engine -->
  <rect x="150" y="22" width="120" height="86" rx="3" fill="#B6FF3C"/>
  <text x="210" y="55" fill="#080B11" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">PEST RISK</text>
  <text x="210" y="69" fill="#080B11" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">ALGORITHM</text>
  <text x="210" y="83" fill="#6F8F2E" font-family="monospace" font-size="8" text-anchor="middle">PHP Backend</text>
  <rect x="162" y="90" width="96" height="4" rx="1" fill="#6F8F2E"/>
  <!-- arrow to mobile (up-right) -->
  <line x1="270" y1="46" x2="328" y2="22" stroke="#B6FF3C" stroke-width="1.2" marker-end="url(#a)"/>
  <!-- arrow to admin (down-right) -->
  <line x1="270" y1="84" x2="328" y2="106" stroke="#34E0E0" stroke-width="1.2" marker-end="url(#b)"/>
  <!-- Mobile App -->
  <rect x="330" y="8" width="130" height="40" rx="3" fill="#161D2A" stroke="#B6FF3C" stroke-width="1"/>
  <text x="395" y="24" fill="#B6FF3C" font-family="monospace" font-size="9" text-anchor="middle">MOBILE APP</text>
  <text x="395" y="38" fill="#8492A6" font-family="monospace" font-size="7.5" text-anchor="middle">React Native · Farmer view</text>
  <!-- Admin Panel -->
  <rect x="330" y="94" width="130" height="28" rx="3" fill="#161D2A" stroke="#34E0E0" stroke-width="1"/>
  <text x="395" y="107" fill="#34E0E0" font-family="monospace" font-size="9" text-anchor="middle">ADMIN PANEL</text>
  <text x="395" y="118" fill="#8492A6" font-family="monospace" font-size="7.5" text-anchor="middle">Farmer onboarding</text>
  <!-- arrow admin to farmbot -->
  <line x1="460" y1="108" x2="506" y2="96" stroke="#34E0E0" stroke-width="1.2" marker-end="url(#b)"/>
  <!-- Farmbot -->
  <rect x="508" y="60" width="130" height="52" rx="3" fill="#161D2A" stroke="#B6FF3C" stroke-width="1"/>
  <text x="573" y="82" fill="#B6FF3C" font-family="monospace" font-size="9" text-anchor="middle">FARMBOT</text>
  <text x="573" y="95" fill="#8492A6" font-family="monospace" font-size="7.5" text-anchor="middle">Automated pest mgmt</text>
  <rect x="518" y="101" width="110" height="4" rx="1" fill="#1F2937"/>
  <!-- label -->
  <text x="752" y="65" fill="#1F2937" font-family="monospace" font-size="7" text-anchor="middle" transform="rotate(90,752,65)">FARMTECH</text>
</svg>
