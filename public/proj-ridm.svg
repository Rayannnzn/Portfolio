  <text x="477" y="26" fill="#B6FF3C" font-family="monospace" font-size="9" text-anchor="middle">PSP INTEGRATIONS</text>
  <text x="477" y="38" fill="#8492A6" font-family="monospace" font-size="7.5" text-anchor="middle">Multi-provider</text>
  <!-- PSP arrow right -->
  <line x1="532" y1="29" x2="580" y2="29" stroke="#B6FF3C" stroke-width="1.2" marker-end="url(#a)"/>
