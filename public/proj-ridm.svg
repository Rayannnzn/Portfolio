  <line x1="214" y1="61" x2="248" y2="61" stroke="#B6FF3C" stroke-width="1.2" marker-end="url(#a)"/>
  <!-- PHP API — highlighted -->
  <rect x="250" y="30" width="104" height="62" rx="3" fill="#B6FF3C"/>
  <text x="302" y="58" fill="#080B11" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">REST</text>
  <text x="302" y="73" fill="#080B11" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">API</text>
