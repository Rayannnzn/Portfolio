<svg viewBox="0 0 800 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#B6FF3C"/></marker>
    <marker id="b" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#34E0E0"/></marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0E131C"/><stop offset="100%" stop-color="#161D2A"/></linearGradient>
  </defs>
  <rect width="800" height="130" fill="url(#bg)"/>
  <g stroke="#1F2937" stroke-width="0.4" opacity="0.5">
    <line x1="0" y1="43" x2="800" y2="43"/><line x1="0" y1="86" x2="800" y2="86"/>
    <line x1="200" y1="0" x2="200" y2="130"/><line x1="400" y1="0" x2="400" y2="130"/>
    <line x1="600" y1="0" x2="600" y2="130"/>
  </g>
  <!-- User -->
  <rect x="18" y="48" width="70" height="30" rx="3" fill="#161D2A" stroke="#1F2937"/>
  <text x="53" y="67" fill="#8492A6" font-family="monospace" font-size="9" text-anchor="middle">USER</text>
  <!-- arrow -->
  <line x1="88" y1="63" x2="118" y2="63" stroke="#B6FF3C" stroke-width="1.2" marker-end="url(#a)"/>
  <!-- Wallet API hub — center -->
  <circle cx="200" cy="63" r="40" fill="#B6FF3C"/>
  <text x="200" y="58" fill="#080B11" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">WALLET</text>
  <text x="200" y="72" fill="#080B11" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">API</text>
  <!-- Quantoz spoke up-right -->
  <line x1="234" y1="35" x2="310" y2="18" stroke="#B6FF3C" stroke-width="1.2" marker-end="url(#a)"/>
  <!-- CleanPay spoke down-right -->
  <line x1="234" y1="90" x2="310" y2="108" stroke="#34E0E0" stroke-width="1.2" marker-end="url(#b)"/>
  <!-- Quantoz -->
  <rect x="312" y="6" width="118" height="30" rx="3" fill="#161D2A" stroke="#B6FF3C" stroke-width="1"/>
  <text x="371" y="18" fill="#B6FF3C" font-family="monospace" font-size="9" text-anchor="middle">QUANTOZ</text>
  <text x="371" y="29" fill="#8492A6" font-family="monospace" font-size="7.5" text-anchor="middle">Crypto Solution Provider</text>
  <!-- Quantoz to blockchain -->
  <line x1="430" y1="21" x2="480" y2="21" stroke="#B6FF3C" stroke-width="1.2" marker-end="url(#a)"/>
  <rect x="482" y="8" width="110" height="26" rx="3" fill="#161D2A" stroke="#B6FF3C" stroke-width="1"/>
  <text x="537" y="25" fill="#B6FF3C" font-family="monospace" font-size="9" text-anchor="middle">₿ BLOCKCHAIN</text>
  <!-- CleanPay -->
  <rect x="312" y="96" width="118" height="30" rx="3" fill="#161D2A" stroke="#34E0E0" stroke-width="1"/>
  <text x="371" y="108" fill="#34E0E0" font-family="monospace" font-size="9" text-anchor="middle">CLEANPAY</text>
  <text x="371" y="119" fill="#8492A6" font-family="monospace" font-size="7.5" text-anchor="middle">Fiat / Cosmo Gateway</text>
  <!-- CleanPay to Banking -->
  <line x1="430" y1="111" x2="480" y2="111" stroke="#34E0E0" stroke-width="1.2" marker-end="url(#b)"/>
  <rect x="482" y="98" width="110" height="26" rx="3" fill="#161D2A" stroke="#34E0E0" stroke-width="1"/>
  <text x="537" y="115" fill="#34E0E0" font-family="monospace" font-size="9" text-anchor="middle">BANKING RAILS</text>
  <!-- Redoc spoke right from hub -->
  <line x1="240" y1="63" x2="612" y2="63" stroke="#8492A6" stroke-width="0.8" stroke-dasharray="4,3"/>
  <rect x="614" y="48" width="96" height="30" rx="3" fill="#161D2A" stroke="#8492A6" stroke-width="1"/>
  <text x="662" y="60" fill="#8492A6" font-family="monospace" font-size="9" text-anchor="middle">REDOC</text>
  <text x="662" y="72" fill="#8492A6" font-family="monospace" font-size="7.5" text-anchor="middle">API Documentation</text>
  <!-- label -->
  <text x="748" y="65" fill="#1F2937" font-family="monospace" font-size="7" text-anchor="middle" transform="rotate(90,748,65)">FLOWSOFTWARE</text>
</svg>
