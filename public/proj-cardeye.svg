<svg viewBox="0 0 800 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#B6FF3C"/></marker>
    <marker id="c" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#FF6B4A"/></marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0E131C"/><stop offset="100%" stop-color="#161D2A"/></linearGradient>
  </defs>
  <rect width="800" height="130" fill="url(#bg)"/>
  <g stroke="#1F2937" stroke-width="0.4" opacity="0.5">
    <line x1="0" y1="43" x2="800" y2="43"/><line x1="0" y1="86" x2="800" y2="86"/>
    <line x1="160" y1="0" x2="160" y2="130"/><line x1="320" y1="0" x2="320" y2="130"/>
    <line x1="480" y1="0" x2="480" y2="130"/><line x1="640" y1="0" x2="640" y2="130"/>
  </g>
  <!-- Card visual -->
  <rect x="18" y="38" width="100" height="60" rx="5" fill="#161D2A" stroke="#B6FF3C" stroke-width="1.5"/>
  <rect x="26" y="48" width="18" height="13" rx="2" fill="#B6FF3C" opacity="0.9"/>
  <text x="26" y="78" fill="#8492A6" font-family="monospace" font-size="7">**** **** ****</text>
  <text x="26" y="89" fill="#8492A6" font-family="monospace" font-size="7">MERCHANT CARD</text>
  <!-- arrow -->
  <line x1="118" y1="68" x2="152" y2="68" stroke="#B6FF3C" stroke-width="1.2" marker-end="url(#a)"/>
  <!-- Gateway -->
  <rect x="154" y="30" width="108" height="76" rx="3" fill="#B6FF3C"/>
  <text x="208" y="62" fill="#080B11" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">PAYMENT</text>
  <text x="208" y="76" fill="#080B11" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">GATEWAY</text>
  <rect x="166" y="84" width="84" height="5" rx="1" fill="#6F8F2E"/>
  <!-- PCI arrow up -->
  <line x1="262" y1="52" x2="330" y2="26" stroke="#FF6B4A" stroke-width="1.2" marker-end="url(#c)"/>
  <!-- Acquiring arrow level -->
  <line x1="262" y1="68" x2="330" y2="68" stroke="#B6FF3C" stroke-width="1.2" marker-end="url(#a)"/>
  <!-- Vault arrow down -->
  <line x1="262" y1="84" x2="330" y2="104" stroke="#B6FF3C" stroke-width="1.2" marker-end="url(#a)"/>
  <!-- PCI DSS -->
  <rect x="332" y="12" width="120" height="30" rx="3" fill="#161D2A" stroke="#FF6B4A" stroke-width="1"/>
  <text x="392" y="24" fill="#FF6B4A" font-family="monospace" font-size="9" text-anchor="middle">PCI DSS LAYER</text>
  <text x="392" y="35" fill="#8492A6" font-family="monospace" font-size="7.5" text-anchor="middle">Quarterly ASV Scans</text>
  <!-- ASV arrow -->
  <line x1="452" y1="27" x2="510" y2="27" stroke="#FF6B4A" stroke-width="1.2" marker-end="url(#c)"/>
  <rect x="512" y="12" width="90" height="30" rx="3" fill="#161D2A" stroke="#FF6B4A" stroke-width="1"/>
  <text x="557" y="24" fill="#FF6B4A" font-family="monospace" font-size="9" text-anchor="middle">ASV SCANNER</text>
  <text x="557" y="35" fill="#8492A6" font-family="monospace" font-size="7.5" text-anchor="middle">Risk Associates</text>
  <!-- Acquiring bank -->
  <rect x="332" y="53" width="120" height="30" rx="3" fill="#161D2A" stroke="#B6FF3C" stroke-width="1"/>
  <text x="392" y="65" fill="#B6FF3C" font-family="monospace" font-size="9" text-anchor="middle">ACQUIRING BANK</text>
  <text x="392" y="76" fill="#8492A6" font-family="monospace" font-size="7.5" text-anchor="middle">Settlement</text>
  <!-- Card Vault -->
  <rect x="332" y="94" width="120" height="28" rx="3" fill="#161D2A" stroke="#B6FF3C" stroke-width="1"/>
  <text x="392" y="111" fill="#B6FF3C" font-family="monospace" font-size="9" text-anchor="middle">CARD DATA VAULT</text>
  <!-- shield badge -->
  <polygon points="700,18 720,25 720,45 700,52 680,45 680,25" fill="none" stroke="#FF6B4A" stroke-width="1.2" opacity="0.5"/>
  <text x="700" y="38" fill="#FF6B4A" font-family="monospace" font-size="13" text-anchor="middle">✓</text>
  <text x="700" y="70" fill="#8492A6" font-family="monospace" font-size="7.5" text-anchor="middle">PCI</text>
  <text x="700" y="80" fill="#8492A6" font-family="monospace" font-size="7.5" text-anchor="middle">COMPLIANT</text>
  <!-- label -->
  <text x="770" y="65" fill="#1F2937" font-family="monospace" font-size="7" text-anchor="middle" transform="rotate(90,770,65)">CARDEYE</text>
</svg>
